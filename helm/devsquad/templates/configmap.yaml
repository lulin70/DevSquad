apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devsquad.fullname" . }}
  labels:
    {{- include "devsquad.labels" . | nindent 4 }}
data:
  LLM_BACKEND: "{{ .Values.envVars.LLM_BACKEND }}"
  LOG_LEVEL: "{{ .Values.envVars.LOG_LEVEL }}"
  OPENAI_MODEL: "{{ .Values.envVars.OPENAI_MODEL }}"
  ANTHROPIC_MODEL: "{{ .Values.envVars.ANTHROPIC_MODEL }}"
  DEVSQUAD_LLM_BACKEND: "{{ .Values.envVars.DEVSQUAD_LLM_BACKEND }}"
  DEVSQUAD_LOG_LEVEL: "{{ .Values.envVars.DEVSQUAD_LOG_LEVEL }}"
  {{- if .Values.envVars.OPENAI_BASE_URL }}
  OPENAI_BASE_URL: "{{ .Values.envVars.OPENAI_BASE_URL }}"
  {{- end }}
  DEVSQUAD_CONFIG: |
    quality_control:
      enabled: true
      strict_mode: true
      min_quality_score: 85
    llm:
      backend: {{ .Values.envVars.LLM_BACKEND }}
      timeout: 120
      log_level: {{ .Values.envVars.LOG_LEVEL }}
