apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "devsquad.serviceAccountName" . }}
  labels:
    {{- include "devsquad.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount | default false }}
---
{{- if and .Values.serviceAccount.create (not .Values.serviceAccount.name) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "devsquad.fullname" . }}
  labels:
    {{- include "devsquad.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "devsquad.fullname" . }}
  labels:
    {{- include "devsquad.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "devsquad.serviceAccountName" . }}
roleRef:
  kind: Role
  name: {{ include "devsquad.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
