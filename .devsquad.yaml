# DevSquad Configuration
# =====================
#
# This file controls DevSquad's behavior.
# - ConfigManager reads flat keys (backend, timeout, etc.)
# - PromptAssembler reads the quality_control section
# - Environment variables (DEVSQUAD_*) take precedence over flat keys.
#
# Location: Project root directory (same level as setup.py)
# Format: YAML (human-readable, easy to edit)
#
# Modification: Edit this file and restart TRAE to apply changes.
# No code changes required for most adjustments.
#

# ===== Quality Control System =====
# Read by PromptAssembler for QC rule injection into worker prompts
quality_control:
  enabled: true
  strict_mode: true
  min_quality_score: 85

  ai_quality_control:
    enabled: true
    hallucination_check:
      enabled: true
      require_traceable_references: true
      require_signature_verification: true
      forbid_absolute_certainty: true
    overconfidence_check:
      enabled: true
      require_alternatives_min: 2
      require_failure_scenarios_min: 3
      acknowledge_tradeoffs: true
    pattern_diversity:
      enabled: true
      check_frequency_every_n_dispatches: 10
      warn_on_overused_patterns: true
    self_verification_prevention:
      enabled: true
      enforce_creator_tester_separation: true
      require_spec_based_testing: true
      min_error_coverage_percent: 15

  ai_security_guard:
    enabled: true
    permission_level: "DEFAULT"
    input_validation:
      enabled: true
      block_high_severity: true
      warn_and_sanitize_medium: true
      flag_low_severity: true
    security_review:
      auto_trigger_when_security_role: true
      veto_enabled: true
      block_on_critical_finding: true
    audit_logging:
      enabled: true
      log_operations: true
      log_filesystem_access: true
      log_network_requests: true
      retention_days: 90

  ai_team_collaboration:
    enabled: true
    raci:
      mode: "strict"
      enforce_one_responsible: true
      enforce_one_accountable: true
      allow_a_override_r: true
    scratchpad:
      protocol: "zoned"
      forbid_cross_zone_writes: true
      forbid_sensitive_in_shared: true
    consensus:
      enabled: true
      threshold: 0.7
      weights:
        architect: 3.0
        security: 2.5
        product-manager: 2.0
        tester: 1.5
        solo-coder: 1.5
        devops: 1.0
        ui-designer: 1.0
      veto_enabled: true
      veto_allowed_roles:
        - security
        - architect
      escalation_policy: "auto"
      escalation_timeout_seconds: 300
    parallel_execution:
      require_file_ownership_declaration: true
      forbid_same_file_writes: true

# ===== LLM Backend (ConfigManager reads these flat keys) =====
backend: "mock"
base_url: ""
model: ""
timeout: 120

# ===== Task Limits =====
max_roles: 10
max_task_length: 10000
min_task_length: 5

# ===== Validation =====
strict_validation: false
output_format: "structured"

# ===== Checkpoint =====
checkpoint_enabled: true
checkpoint_dir: "./checkpoints"

# ===== Workflow =====
workflow_enabled: false
workflow_dir: "./workflows"

# ===== Cache =====
cache_enabled: true
cache_dir: "./data/llm_cache"

# ===== Logging =====
log_level: "WARNING"
