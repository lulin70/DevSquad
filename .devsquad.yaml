# DevSquad Configuration
# =====================
#
# This file controls DevSquad's behavior.
# - ConfigManager reads flat keys (backend, timeout, etc.)
# - PromptAssembler reads the quality_control section
# - Environment variables (DEVSQUAD_*) take precedence over flat keys.
#
# Location: Project root directory (same level as setup.py)
# Format: YAML (human-readable, easy to edit)
#
# Modification: Edit this file and restart TRAE to apply changes.
# No code changes required for most adjustments.
#

# ===== Quality Control System =====
# Read by PromptAssembler for QC rule injection into worker prompts
quality_control:
  enabled: true
  strict_mode: true
  min_quality_score: 85
  minimal_implementation: true
  ponytail_markers: true

  ai_quality_control:
    enabled: true
    hallucination_check:
      enabled: true
      require_traceable_references: true
      require_signature_verification: true
      forbid_absolute_certainty: true
    overconfidence_check:
      enabled: true
      require_alternatives_min: 2
      require_failure_scenarios_min: 3
      acknowledge_tradeoffs: true
    pattern_diversity:
      enabled: true
      check_frequency_every_n_dispatches: 10
      warn_on_overused_patterns: true
    self_verification_prevention:
      enabled: true
      enforce_creator_tester_separation: true
      require_spec_based_testing: true
      min_error_coverage_percent: 15

  ai_security_guard:
    enabled: true
    permission_level: "DEFAULT"
    input_validation:
      enabled: true
      block_high_severity: true
      warn_and_sanitize_medium: true
      flag_low_severity: true
    security_review:
      auto_trigger_when_security_role: true
      veto_enabled: true
      block_on_critical_finding: true
    audit_logging:
      enabled: true
      log_operations: true
      log_filesystem_access: true
      log_network_requests: true
      retention_days: 90

  ai_team_collaboration:
    enabled: true
    # PLANNED — RACI/Scratchpad zone protocol is not yet implemented in code.
    # See docs/audits/V4.1.1_WorkBuddy_Review_Action_Plan.md (P1-7).
    # These config keys are kept for forward-compat; code currently ignores them.
    raci:  # PLANNED - not implemented; code ignores these keys
      mode: "strict"
      enforce_one_responsible: true
      enforce_one_accountable: true
      allow_a_override_r: true
    scratchpad:  # PLANNED - not implemented; code ignores these keys
      protocol: "zoned"  # PLANNED - "zoned" protocol not enforced
      forbid_cross_zone_writes: true
      forbid_sensitive_in_shared: true
    consensus:
      enabled: true
      threshold: 0.7
      # Weights MUST be aligned with scripts/collaboration/models_dispatch.py:ROLE_WEIGHTS.
      # Canonical source = ROLE_WEIGHTS (code-side). This yaml mirror is for visibility only.
      # See docs/audits/V4.1.1_WorkBuddy_Review_Action_Plan.md (P0-5).
      weights:
        architect: 1.5
        security: 1.1
        product-manager: 1.2
        tester: 1.0
        solo-coder: 1.0
        devops: 1.0
        ui-designer: 0.9
      veto_enabled: true
      # PLANNED — veto_allowed_roles is not yet implemented in code.
      # Code currently uses weight < 0 to trigger ESCALATED, not role-name check.
      # See docs/audits/V4.1.1_WorkBuddy_Review_Action_Plan.md (P0-5).
      veto_allowed_roles:
        - security
        - architect
      escalation_policy: "auto"
      escalation_timeout_seconds: 300
    parallel_execution:
      require_file_ownership_declaration: true
      forbid_same_file_writes: true

# ===== LLM Backend (ConfigManager reads these flat keys) =====
backend: "mock"
base_url: ""
model: ""
timeout: 120

# ===== Task Limits =====
max_roles: 10
max_task_length: 10000
min_task_length: 5

# ===== Validation =====
strict_validation: false
output_format: "structured"

# ===== Checkpoint =====
checkpoint_enabled: true
checkpoint_dir: "./checkpoints"

# ===== Workflow =====
workflow_enabled: false
workflow_dir: "./workflows"

# ===== Cache =====
cache_enabled: true
cache_dir: "./data/llm_cache"

# ===== Logging =====
log_level: "WARNING"

# ===== V3.10.0 Compression Enhancements =====
# SMART: structure-aware pre-compression (Phase 2). Preserves all messages,
# compresses JSON/log/code content via ContentRouter + SmartCrusher.
# When True, SMART runs before destructive compression; if tokens still exceed
# threshold, destructive level (SNIP/SESSION_MEMORY/FULL_COMPACT) runs next.
smart_compression: false
# CCRStore: reversible compression store (Phase 3). When set, SmartCrusher
# stores the original content and emits a trace_id marker; Workers can later
# retrieve the full original via devsquad_retrieve(trace_id=...).
# Leave null to disable. Set to a file path to enable SQLite-backed store.
ccr_store_path: null  # e.g. "./data/ccr_store.db"
# TokenBudget: per-dispatch token budget (Phase 3). When set, Coordinator
# enforces total input token limit across all Workers; excess content is
# compressed or truncated to fit the budget.
token_budget_total: null  # e.g. 50000
