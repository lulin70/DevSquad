# Nginx Reverse Proxy Configuration for DevSquad
# ================================================
#
# Description:
#   Nginx configuration for reverse proxying DevSquad services
#   (FastAPI REST API + Streamlit Dashboard) with SSL/TLS termination.
#
# Prerequisites:
#   - Nginx installed (sudo apt install nginx)
#   - SSL certificate obtained (Let's Encrypt recommended)
#   - DevSquad API and Dashboard running on localhost
#
# Installation:
#   sudo cp nginx.conf /etc/nginx/sites-available/devsquad
#   sudo ln -s /etc/nginx/sites-available/devsquad /etc/nginx/sites-enabled/
#   sudo nginx -t  # Test configuration
#   sudo systemctl reload nginx
#
# SSL Certificate (Let's Encrypt):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com -d api.your-domain.com
#

# HTTP → HTTPS Redirect (Optional but recommended)
server {
    listen 80;
    server_name your-domain.com api.your-domain.com dashboard.your-domain.com;
    
    return 301 https://$host$request_uri;
}

# Main Server Block with SSL
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL Configuration
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    
    # Modern SSL settings (recommended by Mozilla)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Logging
    access_log /var/log/nginx/devsquad_access.log;
    error_log  /var/log/nginx/devsquad_error.log;

    # Rate Limiting Zone (define in http context or separate file)
    # limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # limit_req_zone $binary_remote_addr zone=dashboard:10m rate=5r/s;

    # ===== FastAPI REST API =====
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed for streaming)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Rate limiting (uncomment to enable)
        # limit_req zone=api burst=20 nodelay;

        # Buffer settings for large responses
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
    }

    # ===== Streamlit Dashboard =====
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required for Streamlit)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Disable caching for dynamic content
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        
        # Rate limiting (uncomment to enable)
        # limit_req zone=dashboard burst=10 nodelay;
    }

    # Health Check Endpoint (no auth required)
    location /health {
        proxy_pass http://127.0.0.1:8000/api/v1/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Static files (if serving frontend assets)
    # location /static/ {
    #     alias /path/to/static/files/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.(env|yaml|yml|json|log|ini|conf)$ {
        deny all;
        return 404;
    }
}

# API Subdomain (optional - for dedicated API domain)
server {
    listen 443 ssl http2;
    server_name api.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/api.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.your-domain.com/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
