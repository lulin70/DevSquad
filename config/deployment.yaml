# DevSquad V4.0.0-Prod Deployment Configuration
# ==============================================
#
# ⚠️  IMPORTANT: This file contains sensitive credentials!
#    - Do NOT commit real credentials to version control
#    - Use environment variables or secrets manager in production
#    - Change all default passwords before deployment
#    - Generate new session key with: python -c "import secrets; print(secrets.token_hex(32))"
#

# Authentication Settings
authentication:
  enabled: true
  method: "basic"  # basic | oauth2 | ldap

  # Basic Auth Credentials
  # ⚠️  Passwords are PBKDF2-HMAC-SHA256 hashed. NEVER commit plaintext passwords or hints!
  # Format: pbkdf2_sha256$<iterations>$<salt_hex>$<hash_hex>
  # To generate hashes: python -c "import secrets, hashlib; pw='your_password'; salt=secrets.token_bytes(16); print('pbkdf2_sha256$390000$' + salt.hex() + '$' + hashlib.pbkdf2_hmac('sha256', pw.encode(), salt, 390000).hex())"
  # ⚠️  Replace ALL default credentials before any deployment!
  credentials:
    usernames:
      admin:
        email: "admin@devsquad.local"
        name: "Administrator"
        password: "${DEVSQUAD_ADMIN_PASSWORD_HASH}"  # Set via env var
        role: "admin"
      viewer:
        email: "viewer@devsquad.local"
        name: "Viewer"
        password: "${DEVSQUAD_VIEWER_PASSWORD_HASH}"  # Set via env var
        role: "viewer"
      operator:
        email: "operator@devsquad.local"
        name: "Operator"
        password: "${DEVSQUAD_OPERATOR_PASSWORD_HASH}"  # Set via env var
        role: "operator"

  # Cookie settings
  # ⚠️  Session key MUST be set via environment variable in production!
  # Generate with: python -c "import secrets; print(secrets.token_hex(32))"
  cookie:
    expiry_days: 30
    key: "${DEVSQUAD_SESSION_KEY}"  # Set via env var
    name: "devsquad_auth_cookie"
    # Security flags (enforced in production via environments.production override)
    secure: false        # Set true in production (requires HTTPS)
    httponly: true       # Prevent JS access to cookie (mitigate XSS)
    samesite: "Lax"      # Lax | Strict | None (mitigate CSRF)

  # OAuth2 Settings (optional, for enterprise)
  oauth2:
    enabled: false
    provider: "google"  # google | github | azure
    client_id: ""
    client_secret: ""
    redirect_uri: ""

# REST API Security (FastAPI endpoints)
# =====================================
# Secures all /api/v1/* endpoints with API Key authentication + RBAC.
# Set DEVSQUAD_API_AUTH_DISABLED=1 to bypass auth in development.
#
# To generate an API key hash:
#   python -c "import secrets, hashlib; k=secrets.token_urlsafe(32); print(f'Key: {k}'); print(f'Hash: sha256:{hashlib.sha256(k.encode()).hexdigest()}')"
#
# Permission mapping:
#   TASK_EXECUTE  → POST /api/v1/tasks/dispatch, /api/v1/tasks/quick
#   TASK_READ     → GET  /api/v1/tasks/history, /api/v1/roles, /api/v1/lifecycle/*
#   TASK_UPDATE   → POST /api/v1/lifecycle/actions
#   AUDIT_READ    → GET  /api/v1/metrics/*, /api/v1/gates/*, /metrics
#   PUBLIC        → GET  /api/v1/health, /
api_security:
  enabled: false  # Set to true in production; use DEVSQUAD_API_AUTH_DISABLED=1 for dev bypass
  api_keys:
    # ⚠️  Replace with real hashes before deployment!
    # Example: admin key with all permissions
    - key_hash: "${DEVSQUAD_API_KEY_ADMIN_HASH}"  # sha256:<hash> via env var
      user_id: "admin@devsquad.local"
      roles: ["SUPER_ADMIN"]
      active: true
    # Example: analyst key with read-only permissions
    - key_hash: "${DEVSQUAD_API_KEY_ANALYST_HASH}"  # sha256:<hash> via env var
      user_id: "analyst@devsquad.local"
      roles: ["ANALYST"]
      active: true

# Server Configuration
server:
  host: "0.0.0.0"
  port: 8501
  enable_cors: true
  enable_xsf_protection: true

  # SSL/HTTPS Configuration
  ssl:
    enabled: false  # Set to true for production
    cert_file: "/path/to/cert.pem"
    key_file: "/path/to/key.pem"

  # Rate Limiting
  rate_limiting:
    enabled: true
    requests_per_minute: 60
    burst_size: 10

# Dashboard Settings
dashboard:
  title: "DevSquad Lifecycle Dashboard V4.1.3"
  layout: "wide"
  theme: "light"  # light | dark
  
  # Auto-refresh settings
  auto_refresh:
    enabled: false
    interval_seconds: 30

  # Feature flags
  features:
    show_metrics: true
    show_gates: true
    show_performance: true
    allow_phase_control: true  # Allow executing phases from UI

# Logging Configuration
logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  file:
    enabled: true
    path: "logs/dashboard.log"
    max_size_mb: 10
    backup_count: 5

  # External logging (optional)
  external:
    enabled: false
    provider: ""  # cloudwatch | datadog | elk
    endpoint: ""

# Security Headers
security_headers:
  x_frame_options: "DENY"
  x_content_type_options: "nosniff"
  x_xss_protection: "1; mode=block"
  content_security_policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';"
  strict_transport_security: "max-age=31536000; includeSubDomains"

# Backup & Recovery
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM (cron format)
  retention_days: 30
  location: "./backups"

# Monitoring & Health Checks
monitoring:
  health_check:
    enabled: true
    endpoint: "/health"
    interval_seconds: 60
  
  metrics:
    enabled: true
    endpoint: "/metrics"
    
  # Error tracking
  error_tracking:
    enabled: false
    provider: ""  # sentry | rollbar
    dsn: ""

# LLM Backend Configuration
# All credentials are read from environment variables or .env file.
# NEVER hardcode API keys here.
llm:
  default_backend: "${DEVSQUAD_LLM_BACKEND:-auto}"  # auto | mock | trae | openai | anthropic
  # auto: tries real backends (anthropic -> openai) then falls back to mock
  #       set DEVSQUAD_LLM_BACKEND=mock to force mock-only behavior

  openai:
    api_key: "${DEVSQUAD_OPENAI_API_KEY}"
    base_url: "${DEVSQUAD_OPENAI_BASE_URL:-https://api.openai.com/v1}"
    model: "${DEVSQUAD_OPENAI_MODEL:-gpt-4}"
    temperature: 0.7
    max_tokens: 4096
    timeout: 120

  anthropic:
    api_key: "${DEVSQUAD_ANTHROPIC_API_KEY}"
    base_url: "${DEVSQUAD_ANTHROPIC_BASE_URL:-https://api.anthropic.com}"
    model: "${DEVSQUAD_ANTHROPIC_MODEL:-claude-sonnet-4-20250514}"
    max_tokens: 4096
    timeout: 120

  cache:
    enabled: true
    ttl_seconds: 3600
    max_size_mb: 100

  retry:
    max_retries: 3
    initial_delay: 1.0
    backoff_factor: 2.0

# Environment-specific overrides
environments:
  development:
    authentication:
      enabled: false  # Disable auth in dev
    server:
      port: 8501
    logging:
      level: "DEBUG"

  staging:
    authentication:
      enabled: true
    server:
      port: 8501
      ssl:
        enabled: true
    logging:
      level: "INFO"

  production:
    authentication:
      enabled: true
      method: "oauth2"  # Recommended for production
      cookie:
        secure: true          # HC: production MUST use Secure (HTTPS-only)
        httponly: true
        samesite: "Strict"    # Strict in production for max CSRF protection
    api_security:
      enabled: true           # HC: production MUST enable API key auth
    server:
      host: "0.0.0.0"
      port: 443
      ssl:
        enabled: true
      rate_limiting:
        requests_per_minute: 120
    logging:
      level: "WARNING"
    monitoring:
      error_tracking:
        enabled: true
