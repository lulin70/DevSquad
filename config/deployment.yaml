# DevSquad V3.5.0-Prod Deployment Configuration
# ==============================================
#
# ⚠️  IMPORTANT: This file contains sensitive credentials!
#    - Do NOT commit real credentials to version control
#    - Use environment variables or secrets manager in production
#    - Change all default passwords before deployment
#    - Generate new session key with: python -c "import secrets; print(secrets.token_hex(32))"
#

# Authentication Settings
authentication:
  enabled: true
  method: "basic"  # basic | oauth2 | ldap
  
  # Basic Auth Credentials (Production-ready)
  # Passwords are SHA-256 hashed (change these before production!)
  # To generate new hashes: python -c "import hashlib; print(hashlib.sha256('your_password'.encode()).hexdigest())"
  credentials:
    usernames:
      admin:
        email: "admin@devsquad.local"
        name: "Administrator"
        password: "981d9d54c1c0ffe8a1e4b19c92a01b95a9f285c28b7232c32da6fe91e8d5db70"  # SHA-256 of "SecureAdmin@2026!"
        role: "admin"
      viewer:
        email: "viewer@devsquad.local"
        name: "Viewer"
        password: "36a507992fc365505fce99a98495ecc764598efb1fe0b81c0e2aa1fb9ddbcb4c"  # SHA-256 of "SecureViewer@2026!"
        role: "viewer"
      operator:
        email: "operator@devsquad.local"
        name: "Operator"
        password: "0d5ec4c64142aac76a3331c8ec0e54267321710aab42443358c9687011e0cbbd"  # SHA-256 of "SecureOperator@2026!"
        role: "operator"

  # Cookie settings (SECURE SESSION KEY - Generated for this deployment)
  cookie:
    expiry_days: 30
    key: "a3f8c2e1d4b5a6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5"
    name: "devsquad_auth_cookie"

  # OAuth2 Settings (optional, for enterprise)
  oauth2:
    enabled: false
    provider: "google"  # google | github | azure
    client_id: ""
    client_secret: ""
    redirect_uri: ""

# Server Configuration
server:
  host: "0.0.0.0"
  port: 8501
  enable_cors: true
  enable_xsf_protection: true

  # SSL/HTTPS Configuration
  ssl:
    enabled: false  # Set to true for production
    cert_file: "/path/to/cert.pem"
    key_file: "/path/to/key.pem"

  # Rate Limiting
  rate_limiting:
    enabled: true
    requests_per_minute: 60
    burst_size: 10

# Dashboard Settings
dashboard:
  title: "DevSquad Lifecycle Dashboard V3.5.0"
  layout: "wide"
  theme: "light"  # light | dark
  
  # Auto-refresh settings
  auto_refresh:
    enabled: false
    interval_seconds: 30

  # Feature flags
  features:
    show_metrics: true
    show_gates: true
    show_performance: true
    allow_phase_control: true  # Allow executing phases from UI

# Logging Configuration
logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  file:
    enabled: true
    path: "logs/dashboard.log"
    max_size_mb: 10
    backup_count: 5

  # External logging (optional)
  external:
    enabled: false
    provider: ""  # cloudwatch | datadog | elk
    endpoint: ""

# Security Headers
security_headers:
  x_frame_options: "DENY"
  x_content_type_options: "nosniff"
  x_xss_protection: "1; mode=block"
  content_security_policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';"
  strict_transport_security: "max-age=31536000; includeSubDomains"

# Backup & Recovery
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM (cron format)
  retention_days: 30
  location: "./backups"

# Monitoring & Health Checks
monitoring:
  health_check:
    enabled: true
    endpoint: "/health"
    interval_seconds: 60
  
  metrics:
    enabled: true
    endpoint: "/metrics"
    
  # Error tracking
  error_tracking:
    enabled: false
    provider: ""  # sentry | rollbar
    dsn: ""

# LLM Backend Configuration
# All credentials are read from environment variables or .env file.
# NEVER hardcode API keys here.
llm:
  default_backend: "${DEVSQUAD_LLM_BACKEND:-mock}"  # mock | trae | openai | anthropic

  openai:
    api_key: "${DEVSQUAD_OPENAI_API_KEY}"
    base_url: "${DEVSQUAD_OPENAI_BASE_URL:-https://api.openai.com/v1}"
    model: "${DEVSQUAD_OPENAI_MODEL:-gpt-4}"
    temperature: 0.7
    max_tokens: 4096
    timeout: 120

  anthropic:
    api_key: "${DEVSQUAD_ANTHROPIC_API_KEY}"
    base_url: "${DEVSQUAD_ANTHROPIC_BASE_URL:-https://api.anthropic.com}"
    model: "${DEVSQUAD_ANTHROPIC_MODEL:-claude-sonnet-4-20250514}"
    max_tokens: 4096
    timeout: 120

  cache:
    enabled: true
    ttl_seconds: 3600
    max_size_mb: 100

  retry:
    max_retries: 3
    initial_delay: 1.0
    backoff_factor: 2.0

# Environment-specific overrides
environments:
  development:
    authentication:
      enabled: false  # Disable auth in dev
    server:
      port: 8501
    logging:
      level: "DEBUG"

  staging:
    authentication:
      enabled: true
    server:
      port: 8501
      ssl:
        enabled: true
    logging:
      level: "INFO"

  production:
    authentication:
      enabled: true
      method: "oauth2"  # Recommended for production
    server:
      host: "0.0.0.0"
      port: 443
      ssl:
        enabled: true
      rate_limiting:
        requests_per_minute: 120
    logging:
      level: "WARNING"
    monitoring:
      error_tracking:
        enabled: true
