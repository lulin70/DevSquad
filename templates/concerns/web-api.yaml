concern_id: web-api
name: Web API设计增强包
version: "1.0"
description: 帮助设计规范、安全、可演进的Web API，覆盖认证、版本管理、限流、错误处理等关键决策
triggers:
  keywords:
    - API
    - REST
    - RESTful
    - GraphQL
    - 接口
    - 端点
    - endpoint
    - 限流
    - rate limit
    - 版本管理
    - 认证
    - authentication
    - JWT
    - OAuth
    - OpenAPI
    - Swagger
    - HTTP
    - 微服务
    - gateway
    - 网关

decision_framework:
  step_1_api_style:
    question: 选择API风格
    description: 根据使用场景选择最合适的API设计风格
    options:
      - id: rest
        name: RESTful API
        when: 资源型CRUD操作为主，客户端需求相对统一
        examples: 用户管理、订单系统、内容管理
        complexity: 2
        pros: 语义清晰、缓存友好、工具链成熟
        cons: 复杂查询表达困难（过度获取/获取不足）、多资源关联需多次请求
        tech_stack: FastAPI/Spring Boot/Express + OpenAPI 3.1

      - id: graphql
        name: GraphQL
        when: 前端需求多样且变化频繁，多端（Web/iOS/Android）数据需求不同
        examples: 电商商品页、社交Feed流、数据看板
        complexity: 3
        pros: 按需获取、单次请求多资源、强类型Schema
        cons: N+1查询、缓存复杂、安全控制粒度细（字段级权限）
        tech_stack: Apollo/Hasura/Strawberry + DataLoader

      - id: rpc
        name: gRPC / RPC
        when: 微服务间内部通信，对性能和类型安全要求高
        examples: 服务间调用、流式处理、低延迟场景
        complexity: 3
        pros: 强类型、高性能(protobuf)、双向流、代码生成
        cons: 浏览器不原生支持、调试不便、对外暴露需网关转换
        tech_stack: gRPC + protobuf + grpc-gateway

      - id: event-driven
        name: 事件驱动API
        when: 需要实时推送、异步处理、解耦生产者消费者
        examples: 实时通知、IoT数据流、订单状态变更推送
        complexity: 4
        pros: 松耦合、可扩展、实时性
        cons: 一致性挑战、调试困难、消息顺序保证复杂
        tech_stack: WebSocket/SSE + Kafka/RabbitMQ + Schema Registry

    selection_guide: |
      选择建议：
      - 对外公开API → REST（生态最成熟，OpenAPI文档自动生成）
      - 前端需求多变 → GraphQL（按需获取，减少过度/不足）
      - 微服务内部 → gRPC（性能最优，类型安全）
      - 实时场景 → 事件驱动 + REST（混合模式）
      - 不确定时 → REST + 版本管理，后续可叠加GraphQL网关

  step_2_authentication:
    question: 选择认证方案
    description: 根据客户端类型和安全需求选择认证机制
    options:
      - id: jwt
        name: JWT (JSON Web Token)
        when: 无状态服务、微服务架构、移动端应用
        complexity: 2
        pros: 无状态、跨服务验证、自包含用户信息
        cons: Token撤销困难、Payload可见(不要放敏感信息)、Token较大
        implementation: |
          - "Access Token: 短期(15-30分钟)，放在Authorization: Bearer header"
          - Refresh Token: 长期(7-30天)，HttpOnly Cookie存储
          - Token刷新: Access Token过期后用Refresh Token换新
          - Token撤销: 维护黑名单(Redis)或缩短有效期

      - id: oauth2
        name: OAuth 2.0 + OIDC
        when: 第三方登录、SSO、需要委托授权
        complexity: 3
        pros: 标准化、支持第三方、SSO友好
        cons: 实现复杂、依赖Identity Provider
        flows:
          - name: Authorization Code
            when: Web应用（有后端）
            security: 高（Code换Token，Token不暴露给浏览器）
          - name: Authorization Code + PKCE
            when: SPA/移动应用（无后端）
            security: 高（PKCE防止Code截获）
          - name: Client Credentials
            when: 服务间调用
            security: 中（无用户上下文）
          - name: Device Code
            when: IoT设备/CLI工具
            security: 中（用户在另一设备上授权）

      - id: api_key
        name: API Key
        when: 开放API、服务间简单认证、开发者平台
        complexity: 1
        pros: 实现简单、易于撤销和轮换
        cons: 无用户上下文、安全性低（明文传输风险）
        implementation: |
          - "Header: X-API-Key: xxx"
          - 或Query: ?api_key=xxx（不推荐，会出现在日志中）
          - Key生成: 随机UUID或自定义前缀+随机后缀
          - Key管理: 支持多个Key、可设置过期时间、可限制权限范围

      - id: session
        name: Session + Cookie
        when: 传统Web应用、服务端渲染、同域应用
        complexity: 1
        pros: 实现简单、服务端可控、即时撤销
        cons: 有状态（需Session存储）、跨域问题、不适合移动端
        implementation: |
          - Cookie: HttpOnly + Secure + SameSite=Strict/Lax
          - Session存储: Redis（推荐）/ 数据库 / 内存
          - CSRF防护: SameSite Cookie + CSRF Token双重验证

    selection_guide: |
      组合建议：
      - 对外API → API Key（识别调用方）+ JWT/OAuth2（识别用户）
      - 内部管理后台 → Session + Cookie
      - 移动端 → JWT + Refresh Token
      - 第三方集成 → OAuth2
      - 微服务间 → mTLS 或 Client Credentials

  step_3_versioning:
    question: API版本管理策略
    description: 确保API可以安全演进而不破坏现有客户端
    options:
      - id: url_path
        name: URL路径版本
        implementation: /api/v1/users, /api/v2/users
        pros: 直观明确、代理/缓存友好
        cons: URL变化导致客户端需要更新、路由配置增加
        when: 对外公开API、版本差异大

      - id: header
        name: Header版本
        implementation: "Accept: application/vnd.api.v2+json 或 X-API-Version: 2"
        pros: URL不变、语义清晰
        cons: 不直观、调试不便、代理可能忽略自定义Header
        when: 内部API、版本差异小

      - id: query
        name: Query参数版本
        implementation: /api/users?version=2
        pros: 简单、向后兼容
        cons: 容易遗漏、缓存策略复杂
        when: 快速原型、临时兼容

      - id: content_negotiation
        name: 内容协商版本
        implementation: "Accept: application/vnd.api+json; version=2"
        pros: RESTful最规范、灵活
        cons: 复杂、客户端实现困难
        when: 严格RESTful规范要求

    best_practices:
      - 从v1开始，不要无版本
      - 版本变更时提供迁移指南和changelog
      - 旧版本至少维护6个月
      - 使用API网关统一管理版本路由
      - 向后兼容的小改动不升级大版本

  step_4_rate_limiting:
    question: 限流策略
    description: 保护API不被滥用，确保公平使用
    algorithms:
      - name: 固定窗口
        implementation: 每分钟/小时固定请求数
        pros: 实现简单
        cons: 窗口边界突发（两个窗口交界处可能2倍流量）
        when: 简单场景、要求不严格

      - name: 滑动窗口
        implementation: 统计最近N秒的请求数
        pros: 平滑、无边界问题
        cons: 实现稍复杂（需记录每个请求时间戳）
        when: 精确限流要求

      - name: 令牌桶
        implementation: 固定速率补充令牌，请求消耗令牌
        pros: 允许突发流量、平均速率可控
        cons: 需要选择合适的桶容量和补充速率
        when: 允许短时突发、控制平均速率（最常用）

      - name: 漏桶
        implementation: 请求进入队列，固定速率处理
        pros: 输出速率绝对均匀
        cons: 不允许任何突发、队列溢出丢弃请求
        when: 下游处理能力固定、需平滑流量

    response_headers:
      - X-RateLimit-Limit: 窗口内允许的最大请求数
      - X-RateLimit-Remaining: 窗口内剩余请求数
      - X-RateLimit-Reset: 窗口重置时间(Unix时间戳)
      - Retry-After: 被限流时建议重试等待秒数

    http_status: 429 Too Many Requests

  step_5_error_handling:
    question: 错误处理规范
    description: 统一错误响应格式，便于客户端处理和调试
    standard: RFC 7807 Problem Details
    format:
      type: "application/problem+json"
      fields:
        - name: type
          description: 错误类型的URI引用
          example: "https://api.example.com/errors/validation"
        - name: title
          description: 人类可读的错误标题
          example: "Validation Error"
        - name: status
          description: HTTP状态码
          example: 422
        - name: detail
          description: 具体错误描述
          example: "Email format is invalid"
        - name: instance
          description: 发生错误的具体请求路径
          example: "/api/v1/users"
        - name: trace_id
          description: 请求追踪ID，用于日志关联
          example: "abc-123-def"

    common_status_codes:
      - code: 400
        meaning: 请求格式错误
        action: 检查请求参数格式
      - code: 401
        meaning: 未认证
        action: 提供有效的认证凭证
      - code: 403
        meaning: 无权限
        action: 检查用户角色和资源权限
      - code: 404
        meaning: 资源不存在
        action: 检查资源ID和路径
      - code: 409
        meaning: 资源冲突
        action: 检查唯一性约束
      - code: 422
        meaning: 业务校验失败
        action: 检查业务规则约束
      - code: 429
        meaning: 请求过于频繁
        action: 等待Retry-After秒后重试
      - code: 500
        meaning: 服务器内部错误
        action: 联系管理员，提供trace_id

checklist:
  must_have:
    - item: API风格已选择并记录理由
      severity: required
    - item: 认证方案已确定（JWT/OAuth2/API Key/Session）
      severity: required
    - item: 版本管理策略已确定
      severity: required
    - item: 限流策略已实现（含响应头）
      severity: required
    - item: 错误响应格式统一（RFC 7807或自定义规范）
      severity: required
    - item: 分页/排序/过滤规范已定义
      severity: high
    - item: CORS策略已配置
      severity: required
    - item: HTTPS强制（生产环境）
      severity: required
    - item: 请求大小限制已设置
      severity: high
    - item: 超时配置已设置
      severity: high

  common_pitfalls:
    - title: 认证和授权混淆
      description: 401用于未认证（不知道你是谁），403用于无权限（知道你是谁但你不被允许）
      severity: high
      check: 错误响应是否正确区分401和403？
      fix: 401 = 未提供凭证或凭证无效；403 = 凭证有效但权限不足

    - title: 敏感信息在URL中暴露
      description: API Key、Token、密码等出现在URL中，会被浏览器历史、代理日志、Referer头记录
      severity: critical
      check: 敏感参数是否通过Header或Body传递？
      fix: 认证信息放Authorization Header，查询参数不放敏感值

    - title: 缺少幂等性设计
      description: 重复调用POST创建接口导致重复数据，网络超时后客户端重试产生副作用
      severity: high
      check: 写操作是否设计了幂等性机制？
      fix: POST使用幂等键(Idempotency-Key)，PUT天然幂等，DELETE设计为幂等

    - title: N+1查询
      description: 列表接口返回关联数据时，每个项目单独查询关联表，导致大量SQL
      severity: medium
      check: 列表接口是否使用了预加载(eager loading)？
      fix: ORM的prefetch_related/select_related，或GraphQL的DataLoader

    - title: 分页缺失或不一致
      description: 列表接口没有分页，或不同接口分页参数不统一
      severity: medium
      check: 所有列表接口是否都有分页？分页参数是否统一？
      fix: 统一分页规范（cursor-based或offset-based），默认page_size

    - title: 忽略CORS预检请求
      description: 自定义Header的跨域请求需要OPTIONS预检，服务端未处理导致前端请求失败
      severity: high
      check: 是否正确处理了OPTIONS请求？CORS Header是否完整？
      fix: 中间件统一处理CORS，OPTIONS请求返回204 + 正确的CORS Header

role_enhancements:
  architect:
    extra_prompt: |
      【Web API架构设计要点】
      在设计API架构时，必须关注：
      1. API风格选择：REST覆盖80%场景，GraphQL适合前端多变需求，gRPC适合内部通信
      2. 认证分层：网关层认证(谁在调用) + 服务层授权(能做什么) + 数据层过滤(能看到什么)
      3. 版本管理：从v1开始，URL路径版本最实用，旧版本至少维护6个月
      4. 限流设计：令牌桶最常用，必须返回RateLimit响应头
      5. 幂等性：所有写操作必须考虑幂等性，特别是支付和创建类操作
      6. 向后兼容：新增字段可选，删除字段先标记deprecated，至少保留一个版本周期

  security:
    extra_prompt: |
      【Web API安全检查要点】
      在审查API安全时，必须覆盖：
      1. 认证机制：JWT短期+Refresh Token长期，OAuth2用PKCE，API Key不放URL
      2. 输入验证：所有输入必须服务端校验，不信任客户端
      3. 输出控制：错误响应不暴露堆栈信息，生产环境关闭debug模式
      4. CORS配置：明确允许的Origin，不使用Access-Control-Allow-Origin: *
      5. HTTPS强制：所有API必须HTTPS，HSTS Header
      6. 请求大小限制：防止DoS，限制请求体大小和字段长度
      7. SQL注入：参数化查询，ORM默认防注入但不绝对
      8. 批量操作：限制单次批量操作数量，防止资源耗尽

  tester:
    extra_prompt: |
      【Web API测试要点】
      在设计API测试策略时，必须覆盖：
      1. 契约测试：验证API响应是否符合OpenAPI Schema
      2. 认证测试：未认证返回401，无权限返回403，过期Token返回401
      3. 幂等性测试：相同请求重复调用，结果一致
      4. 限流测试：超过限制返回429 + Retry-After Header
      5. 边界测试：空列表、最大分页、超长字符串、特殊字符
      6. 并发测试：同一资源的并发修改（乐观锁/悲观锁）
      7. 版本兼容：v1客户端在v2上线后仍能正常工作
