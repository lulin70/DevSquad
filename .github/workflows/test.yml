name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    env:
      DEVSQUAD_LLM_BACKEND: mock

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-asyncio pytest-timeout httpx mcp

      - name: Run tests
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/integration \
            --ignore=tests/e2e \
            --ignore=tests/test_cli_phase5.py \
            -m "not slow" \
            --timeout=120

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: pip install ruff
      - name: Lint
        run: ruff check scripts/ --ignore=E501,W291 --exit-zero

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Install and check package
        run: |
          pip install dist/*.whl
          python -c "from scripts.collaboration.dispatcher import MultiAgentDispatcher; print('OK')"
