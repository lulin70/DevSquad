name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"  # Nightly at 2AM UTC

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    env:
      DEVSQUAD_LLM_BACKEND: mock
      DEVSQUAD_API_AUTH_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-asyncio pytest-timeout httpx mcp

      - name: Install coverage tool
        run: pip install pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/integration \
            --ignore=tests/e2e \
            -m "not slow" \
            --timeout=120 \
            --cov=scripts \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Run E2E on: nightly schedule, manual dispatch, or release tags (v*)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    env:
      DEVSQUAD_LLM_BACKEND: mock
      DEVSQUAD_API_AUTH_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-asyncio pytest-timeout httpx mcp
      - name: Run E2E tests
        run: |
          python -m pytest tests/e2e/ tests/integration/ \
            -q --tb=short \
            --timeout=300 \
            -m "not slow"

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run security scan
        run: bandit -r scripts/ -c pyproject.toml -ll

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install lint tools
        run: pip install ruff mypy
      - name: Lint
        run: ruff check scripts/ skills/ --ignore=E501,W291
      - name: Type check (blocking since V3.9.1)
        run: mypy scripts/collaboration/ --ignore-missing-imports --no-error-summary
      # Full scripts/ mypy check (blocking since V3.10.0).
      # Achievement: 112 errors → 0 (V3.10.0, 2026-06-30).
      # Previously baseline=115 non-blocking; now enforces 0-error policy.
      - name: Type check scripts/ full (blocking)
        run: |
          mypy scripts/ --ignore-missing-imports --no-error-summary 2>&1 | tee /tmp/mypy_full.log
          error_count=$(grep -c "error:" /tmp/mypy_full.log || echo "0")
          if [ "$error_count" -gt 0 ]; then
            echo "ERROR: mypy found $error_count error(s) — must be 0 (V3.10.0 policy)"
            exit 1
          fi
          echo "OK: mypy 0 errors (V3.10.0 achievement maintained)"
      - name: Version consistency check (added in P2-6)
        run: python scripts/check_version_consistency.py

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test, lint, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Install and check package
        run: |
          pip install dist/*.whl
          python -c "from scripts.collaboration.dispatcher import MultiAgentDispatcher; print('OK')"
