name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"  # Nightly at 2AM UTC

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      DEVSQUAD_LLM_BACKEND: mock
      DEVSQUAD_API_AUTH_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-asyncio pytest-timeout httpx2 mcp streamlit Pillow fakeredis redis

      - name: Install coverage tool
        run: pip install pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/integration \
            --ignore=tests/e2e \
            -m "not slow" \
            --timeout=120 \
            --cov=scripts \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage
        # NOTE: Codecov upload requires CODECOV_TOKEN secret for private repos / branch protection.
        # If CODECOV_TOKEN is not configured, upload fails silently (fail_ci_if_error: false).
        # Coverage report is still generated as coverage.xml artifact below.
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          # token: ${{ secrets.CODECOV_TOKEN }}  # uncomment after configuring secret

      - name: Upload coverage artifact
        # Always upload coverage.xml as an artifact so coverage data is preserved
        # even when Codecov token is not configured.
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: ./coverage.xml
          retention-days: 14

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Run E2E on: PRs to main, nightly schedule, manual dispatch, or release tags (v*)
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    env:
      # Use "auto" so real LLM tests run when secrets are present, otherwise mock.
      DEVSQUAD_LLM_BACKEND: auto
      DEVSQUAD_API_AUTH_DISABLED: "1"
      DEVSQUAD_OPENAI_API_KEY: ${{ secrets.DEVSQUAD_OPENAI_API_KEY }}
      DEVSQUAD_OPENAI_BASE_URL: ${{ secrets.DEVSQUAD_OPENAI_BASE_URL }}
      DEVSQUAD_OPENAI_MODEL: ${{ secrets.DEVSQUAD_OPENAI_MODEL }}
      DEVSQUAD_ANTHROPIC_API_KEY: ${{ secrets.DEVSQUAD_ANTHROPIC_API_KEY }}
      DEVSQUAD_ANTHROPIC_BASE_URL: ${{ secrets.DEVSQUAD_ANTHROPIC_BASE_URL }}
      DEVSQUAD_ANTHROPIC_MODEL: ${{ secrets.DEVSQUAD_ANTHROPIC_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-asyncio pytest-timeout httpx2 mcp openai anthropic streamlit Pillow fakeredis redis
      - name: Run E2E tests
        run: |
          python -m pytest tests/e2e/ tests/integration/ \
            -q --tb=short \
            --timeout=300 \
            -m "not slow"

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history for PR diff scan
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install bandit + pip-audit
        run: pip install bandit[toml] pip-audit
      - name: Run bandit security scan
        run: bandit -r scripts/ -c pyproject.toml -ll
      - name: Run pip-audit (dependency CVE scan, added in V4.1.2)
        run: |
          # Scan installed dependencies for known CVEs.
          # Fails only on critical/high severity (medium/low are reported but non-blocking).
          # Upgrade setuptools first to avoid PYSEC-2026-3447 (fixed in setuptools 83.0.0+).
          pip install --upgrade "setuptools>=83.0.0"
          pip-audit --strict --progress-spinner off
      - name: Run gitleaks secret scan (added in V4.1.2)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install lint tools
        run: pip install ruff==0.15.20 mypy==2.2.0 radon==6.0.1
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install fastapi uvicorn pydantic streamlit mcp prometheus-client psutil slack-sdk openai anthropic httpx2
      - name: Lint
        run: ruff check . --ignore=E501
      - name: Complexity check (radon cc, blocking since V4.1.1)
        run: |
          # radon cc -nd shows only D/E/F grade functions (complexity >= 16)
          # V4.1.1 achievement: zero D+ functions (22 refactored to C/B/A)
          output=$(radon cc scripts/ -nd -s 2>&1)
          if [ -n "$output" ]; then
            echo "ERROR: radon cc found D+ functions (complexity >= 16, grade D/E/F)"
            echo "$output"
            exit 1
          fi
          echo "OK: radon cc zero D+ functions (V4.1.1 achievement maintained)"
      - name: Type check (blocking since V3.9.1)
        run: mypy scripts/collaboration/ --ignore-missing-imports --no-error-summary
      # Full scripts/+skills/ mypy check (blocking since V3.10.0).
      # Achievement: 112 errors → 0 (V3.10.0, 2026-06-30).
      # skills/ added to mypy scope in V3.9.2 Round 9 (P1-1).
      - name: Type check scripts/+skills/ full (blocking)
        run: |
          mypy scripts/ skills/ --ignore-missing-imports --no-error-summary 2>&1 | tee /tmp/mypy_full.log
          error_count=$(grep -c "error:" /tmp/mypy_full.log || echo "0")
          if [ "$error_count" -gt 0 ]; then
            echo "ERROR: mypy found $error_count error(s) — must be 0 (V3.10.0 policy)"
            exit 1
          fi
          echo "OK: mypy 0 errors (scripts/ + skills/, V3.10.0 achievement maintained)"
      - name: Version consistency check (added in P2-6)
        run: python scripts/check_version_consistency.py
      - name: Dependency sync check (added in v4.0.11)
        run: python scripts/check_dependency_sync.py

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test, lint, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Install and check package
        run: |
          pip install dist/*.whl
          python -c "from scripts.collaboration.dispatcher import MultiAgentDispatcher; print('OK')"
