name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"  # Nightly at 2AM UTC

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    env:
      DEVSQUAD_LLM_BACKEND: mock

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-asyncio pytest-timeout httpx mcp

      - name: Install coverage tool
        run: pip install pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/integration \
            --ignore=tests/e2e \
            --ignore=tests/test_cli_phase5.py \
            -m "not slow" \
            --timeout=120 \
            --cov=scripts \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      DEVSQUAD_LLM_BACKEND: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-asyncio pytest-timeout httpx mcp
      - name: Run E2E tests
        run: |
          python -m pytest tests/e2e/ tests/integration/ \
            -q --tb=short \
            --timeout=300 \
            -m "not slow"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run security scan
        run: bandit -r scripts/ -c pyproject.toml -ll

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: pip install ruff mypy
      - name: Lint
        run: ruff check scripts/ skills/ --ignore=E501,W291
      - name: Type check (non-blocking)
        run: mypy scripts/collaboration/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Install and check package
        run: |
          pip install dist/*.whl
          python -c "from scripts.collaboration.dispatcher import MultiAgentDispatcher; print('OK')"
