name: Release

# Triggered when a version tag (v*) is pushed.
# Builds the package, verifies the built version matches the tag, publishes
# to PyPI, and creates a GitHub Release with auto-generated notes.
#
# Hard constraints satisfied:
#   - HC: release.yml MUST include publish-pypi job (project_memory)
#   - HC: publish-pypi MUST verify built version == tag version (project_memory)
#   - HC: git tag is the release trigger (no tag = no release)

on:
  push:
    tags: ["v*"]

permissions:
  contents: write  # for creating GitHub Release

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Run version consistency check
        run: python scripts/check_version_consistency.py --strict

      - name: Extract tag version
        id: tag_version
        run: |
          # Strip leading 'v' from tag name: v3.9.2 -> 3.9.2
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted tag version: $TAG_VERSION"

      - name: Verify tag version matches canonical source
        run: |
          TAG_VERSION="${{ steps.tag_version.outputs.version }}"
          CANONICAL_VERSION=$(python -c "from scripts.collaboration._version import __version__; print(__version__)")
          if [ "$TAG_VERSION" != "$CANONICAL_VERSION" ]; then
            echo "ERROR: tag version ($TAG_VERSION) != canonical _version.py ($CANONICAL_VERSION)"
            exit 1
          fi
          echo "OK: tag ($TAG_VERSION) == canonical ($CANONICAL_VERSION)"

      - name: Build package
        run: python -m build

      - name: Verify built distribution version matches tag
        run: |
          TAG_VERSION="${{ steps.tag_version.outputs.version }}"
          # Read version from built wheel metadata
          BUILT_VERSION=$(twine check dist/* 2>&1 | head -1 || true)
          # Extract version from wheel filename: devsquad-3.9.2-py3-none-any.whl
          WHEEL_VERSION=$(ls dist/*.whl | sed -E 's/.*devsquad-([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "Wheel version: $WHEEL_VERSION"
          if [ "$WHEEL_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: built wheel version ($WHEEL_VERSION) != tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "OK: built wheel ($WHEEL_VERSION) == tag ($TAG_VERSION)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    environment: pypi  # requires manual approval in GitHub env protection
    permissions:
      id-token: write  # required for PyPI OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (OIDC Trusted Publishing)
        # OIDC Trusted Publishing: no API token is stored. PyPI verifies this
        # workflow's identity via a short-lived OIDC token issued by GitHub.
        # Requirements (all already satisfied in this job):
        #   - `permissions: id-token: write` (job-level, set above)
        #   - `environment: pypi` (set above)
        #   - A Trusted Publisher registered on PyPI at
        #     https://pypi.org/manage/account/publishing/ matching:
        #       Owner=lulin70, Repository=DevSquad,
        #       Workflow=.github/workflows/release.yml, Environment=pypi
        # When NO `password` input is given, pypa/gh-action-pypi-publish
        # automatically authenticates via OIDC. See
        # docs/PyPI_OIDC_Trusted_Publishing_Setup.md for full setup.
        #
        # FALLBACK (legacy API token): if OIDC ever breaks, restore token
        # auth by uncommenting the `password:` line below. The action prefers
        # an explicit password over OIDC when both are present, so providing
        # `password` disables OIDC for that run. Do NOT set `password` to the
        # literal string `__token__`; the secret must hold the full API token.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # password: ${{ secrets.PYPI_API_TOKEN }}  # OIDC fallback (legacy)
          # Idempotent: skip if version already exists on PyPI
          skip-existing: true

      - name: Verify PyPI publication
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Waiting for PyPI to index $TAG_VERSION..."
          sleep 30
          # Check that the version is now installable
          pip install --no-deps "devsquad==$TAG_VERSION" --target /tmp/verify_install
          INSTALLED_VERSION=$(python -c "import sys; sys.path.insert(0,'/tmp/verify_install'); from scripts.collaboration._version import __version__; print(__version__)")
          if [ "$INSTALLED_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: installed version ($INSTALLED_VERSION) != tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "OK: pip install devsquad==$TAG_VERSION verified ($INSTALLED_VERSION)"

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DevSquad ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
